name: Daily STATUS.md update

# Keeps STATUS.md current every night even when no Claude session is alive.
# Runs on GitHub's servers — no local machine or live session required.

on:
  schedule:
    # 09:07 UTC = ~1am Pacific (12:07am PDT / 1:07am PST). Adjust the hour
    # if you want a different timezone: cron here is always UTC.
    - cron: "7 9 * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit summaries)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Update STATUS.md
        env:
          TZ: America/Los_Angeles   # date stamping timezone
        run: python3 scripts/update-status.py

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain STATUS.md)" ]; then
            git config user.name  "rankrebels-bot"
            git config user.email "actions@github.com"
            git add STATUS.md
            git commit -m "Daily status update"
            git push origin main
            echo "Pushed STATUS.md update."
          else
            echo "No change to STATUS.md."
          fi
