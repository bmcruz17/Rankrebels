name: Send scheduled emails

# Triggers the scheduled-send processor. Each queued email carries an exact send_at
# (e.g. tomorrow 8:30am Pacific); the processor only sends ones whose time has passed,
# so the email goes out on the first run after its scheduled time.

on:
  schedule:
    # every 20 min, all day — each email carries an exact send_at and only goes
    # out once its time has passed, so any picked time fires within ~20 min.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: send-scheduled
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Run processor
        run: |
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            "https://rankrebels.ai/api/google/run-scheduled" \
            -H "X-Sched-Secret: ${{ secrets.SCHED_SECRET }}")
          echo "HTTP $code"; cat /tmp/out.json || true
          test "$code" = "200"
