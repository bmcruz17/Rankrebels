<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rank Rebels — Client Report</title>
<link rel="icon" href="/brand/icon-32.png">
<style>
:root{
  --green:#15803d; --green-d:#0f5f2e; --green-l:#22a155; --gold:#c79a1e; --gold-d:#a07d12;
  --ink:#12201a; --muted:#5f6f66; --muted-2:#8a978f; --line:#e6ece8; --bg:#f4f7f5; --card:#fff;
  --grey:#b8c2bc;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1080px;margin:0 auto;padding:22px 20px 60px}
/* header */
.rpt-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.brand{display:flex;align-items:center;gap:11px}
.brand img{width:34px;height:34px;border-radius:8px}
.brand .bn{font-weight:800;font-size:15px;letter-spacing:.01em}
.brand .bs{font-size:12px;color:var(--muted)}
.h-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#f0f5f1}
.btn-g{background:var(--green);border-color:var(--green);color:#fff}
.btn-g:hover{background:var(--green-d)}
.title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:14px 0 4px}
h1{font-size:25px;margin:0;letter-spacing:-.02em}
.subtitle{color:var(--muted);font-size:13.5px;margin:2px 0 0}
.badge-trend{display:inline-flex;align-items:center;gap:6px;background:rgba(21,128,61,.1);color:var(--green);font-weight:700;font-size:12.5px;padding:5px 11px;border-radius:999px}
.note{background:rgba(199,154,30,.12);border:1px solid rgba(199,154,30,.3);color:#7c620f;border-radius:10px;padding:9px 14px;font-size:12.5px;margin:12px 0 0}
/* kpi cards */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
@media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kpis{grid-template-columns:1fr}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative}
.kpi:hover{box-shadow:0 6px 18px rgba(18,32,26,.07);border-color:#d2ddd6}
.kpi.open{border-color:var(--green);box-shadow:0 6px 20px rgba(21,128,61,.12)}
.kpi .k-top{display:flex;align-items:center;justify-content:space-between}
.kpi .k-ico{width:34px;height:34px;border-radius:9px;background:rgba(21,128,61,.1);display:flex;align-items:center;justify-content:center;font-size:17px}
.kpi .k-info{font-size:11px;color:var(--muted-2);border:1px solid var(--line);border-radius:999px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:800}
.kpi.open .k-info{background:var(--green);color:#fff;border-color:var(--green)}
.kpi .k-val{font-size:30px;font-weight:850;letter-spacing:-.02em;margin-top:10px;line-height:1}
.kpi .k-lbl{font-size:13px;color:var(--muted);margin-top:3px;font-weight:600}
.kpi .k-delta{font-size:12.5px;font-weight:700;margin-top:7px;display:inline-flex;align-items:center;gap:4px}
.k-up{color:var(--green)} .k-down{color:#c0392b} .k-flat{color:var(--muted)}
.k-explain{display:none;margin-top:13px;padding-top:13px;border-top:1px dashed var(--line);font-size:12.5px}
.kpi.open .k-explain{display:block}
.k-explain .ex{margin-bottom:9px}
.k-explain .ex:last-child{margin-bottom:0}
.k-explain .ex .lab{font-weight:800;color:var(--ink);font-size:11px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px;margin-bottom:2px}
.k-explain .ex .lab .d{width:7px;height:7px;border-radius:2px;background:var(--green)}
.k-explain .ex.rr .lab .d{background:var(--gold)}
.k-explain .ex p{margin:0;color:var(--muted);line-height:1.5}
.tap-hint{font-size:11px;color:var(--muted-2);margin-top:8px;display:flex;align-items:center;gap:5px}
.kpi.open .tap-hint{display:none}
/* panels */
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-top:14px}
@media(max-width:860px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.panel h3{margin:0 0 2px;font-size:15px}
.panel .psub{color:var(--muted);font-size:12.5px;margin:0 0 12px}
/* donut */
.donut-wrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.donut-legend{flex:1;min-width:150px;display:flex;flex-direction:column;gap:7px}
.lg-row{display:flex;align-items:center;gap:9px;font-size:13px;cursor:default;padding:3px 5px;border-radius:7px;transition:background .12s}
.lg-row:hover{background:#f1f6f2}
.lg-dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.lg-name{flex:1;color:var(--ink)}
.lg-pct{font-weight:800}
.lg-val{color:var(--muted-2);font-size:12px;min-width:42px;text-align:right}
/* chart */
.chart-legend{display:flex;gap:16px;font-size:12.5px;color:var(--muted);margin-bottom:6px}
.chart-legend span{display:inline-flex;align-items:center;gap:6px}
.cl-dot{width:10px;height:10px;border-radius:3px}
/* tabs */
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:2px;flex-wrap:wrap}
.tab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--green);border-bottom-color:var(--green)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-2);font-weight:700;padding:9px 8px;border-bottom:1px solid var(--line)}
td{padding:10px 8px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
.num{text-align:right;font-variant-numeric:tabular-nums}
.rank-pill{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:22px;padding:0 7px;border-radius:7px;background:rgba(21,128,61,.1);color:var(--green);font-weight:800;font-size:12px}
.chg-up{color:var(--green);font-weight:700} .chg-down{color:#c0392b;font-weight:700} .chg-flat{color:var(--muted-2)}
.kw-row{cursor:pointer}
.kw-row:hover{background:#f6faf7}
.kw-explain td{background:#f6faf7;color:var(--muted);font-size:12.5px;padding:6px 12px 12px}
.foot{margin-top:26px;text-align:center;color:var(--muted-2);font-size:12px}
.loading{padding:60px 0;text-align:center;color:var(--muted)}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.tip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-size:12px;padding:6px 9px;border-radius:7px;opacity:0;transition:opacity .1s;z-index:50;white-space:nowrap}
@media print{
  body{background:#fff}
  .h-actions{display:none}
  .kpi{break-inside:avoid} .panel{break-inside:avoid}
  .k-explain{display:block!important}
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading"><div class="spinner"></div>Loading report…</div>
</div>
<div class="tip" id="tip"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SB_URL='https://eejmocneacfleltspedl.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlam1vY25lYWNmbGVsdHNwZWRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDQ3MTMsImV4cCI6MjA5NzgyMDcxM30.dXJTMFp_d9JRlXkesVPCUj6tBi3qphxxOu3v-Cuw7_Y';
var sb=window.supabase.createClient(SB_URL,SB_KEY);
var DONUT_COLORS=['#15803d','#c79a1e','#0f5f2e','#b8c2bc','#22a155'];
var clientId=new URLSearchParams(location.search).get('client')||'';
var DATA=null;

function el(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmt(n){return Number(n||0).toLocaleString();}
function pct(now,prev){ now=Number(now||0); prev=Number(prev||0); if(!prev) return now>0?100:0; return Math.round((now-prev)/prev*100); }

// Plain-English explanation for each KPI. {what, why, rr} + a computed "good" line.
var METRICS=[
  { key:'organic', icon:'🔍', label:'Organic sessions',
    now:function(k){return k.organic;}, prev:function(k){return k.organicPrev;},
    what:'People who found you on Google (or another search engine) and clicked through to your website — without you paying for an ad.',
    why:'This is free traffic you would otherwise lose to a competitor. More organic sessions means more potential customers landing on your business every month.',
    rr:'We optimize your site and content so Google ranks you higher for the things your customers are actually searching for.' },
  { key:'gbpViews', icon:'📍', label:'Google Business views',
    now:function(k){return k.gbpViews;}, prev:function(k){return k.gbpViewsPrev;},
    what:'How many times your Google Business Profile was shown — in Google Search and on Google Maps.',
    why:'This is the listing locals see when they search your name or "near me." The more it shows, the more calls, directions, and walk-ins you get.',
    rr:'We keep your profile complete, posting regularly, and optimized so Google surfaces it more often to nearby customers.' },
  { key:'calls', icon:'📞', label:'Calls from search',
    now:function(k){return k.calls;}, prev:function(k){return k.callsPrev;},
    what:'Phone calls placed straight from your Google listing or your website’s call button.',
    why:'These are your hottest leads — someone ready to book picked up the phone. It is revenue you can hear ringing.',
    rr:'We make your number tap-to-call everywhere and push your profile so more ready-to-buy searchers reach for it.' },
  { key:'conversions', icon:'🎯', label:'Conversions',
    now:function(k){return k.conversions;}, prev:function(k){return k.conversionsPrev;},
    what:'Visitors who took a key action — booked, filled out a form, or requested a quote.',
    why:'Traffic only matters if it turns into customers. Conversions are the bottom line: real leads from your online presence.',
    rr:'We design your pages and calls-to-action to turn visitors into booked jobs, not just clicks.' }
];
function goodLine(p){
  if(p>=50) return 'Up '+p+'% vs the prior 90 days — well above a typical quarter. Strong momentum.';
  if(p>=15) return 'Up '+p+'% vs the prior 90 days — healthy, above-average growth.';
  if(p>0)   return 'Up '+p+'% vs the prior 90 days — trending in the right direction.';
  if(p===0) return 'Holding steady vs the prior 90 days.';
  return 'Down '+Math.abs(p)+'% vs the prior 90 days — we’re already on it.';
}

function kpiCard(m,i){
  var k=DATA.kpis, now=m.now(k), prev=m.prev(k), p=pct(now,prev);
  var cls=p>0?'k-up':(p<0?'k-down':'k-flat'), arrow=p>0?'▲':(p<0?'▼':'■');
  var deltaTxt=prev?(arrow+' '+Math.abs(p)+'% vs prior period'):'new this period';
  return '<div class="kpi" id="kpi-'+i+'" onclick="toggleKpi('+i+')">'+
    '<div class="k-top"><div class="k-ico">'+m.icon+'</div><div class="k-info">i</div></div>'+
    '<div class="k-val">'+fmt(now)+'</div>'+
    '<div class="k-lbl">'+esc(m.label)+'</div>'+
    '<div class="k-delta '+cls+'">'+deltaTxt+'</div>'+
    '<div class="tap-hint">ⓘ Tap to see what this means</div>'+
    '<div class="k-explain">'+
      ex('What it means', m.what,false)+
      ex('Why it matters', m.why,false)+
      ex('How you’re doing', goodLine(p),false)+
      ex('What Rank Rebels does', m.rr,true)+
    '</div></div>';
}
function ex(lab,body,rr){ return '<div class="ex'+(rr?' rr':'')+'"><div class="lab"><span class="d"></span>'+lab+'</div><p>'+esc(body)+'</p></div>'; }
function toggleKpi(i){ var c=el('kpi-'+i); if(c) c.classList.toggle('open'); }

// SVG donut for traffic sources
function donut(sources){
  var total=sources.reduce(function(a,s){return a+Number(s.value||0);},0)||1;
  var R=54, C=2*Math.PI*R, off=0, segs='';
  sources.forEach(function(s,i){
    var frac=Number(s.value||0)/total, len=frac*C, color=DONUT_COLORS[i%DONUT_COLORS.length];
    segs+='<circle class="seg" data-i="'+i+'" cx="70" cy="70" r="'+R+'" fill="none" stroke="'+color+'" stroke-width="20" '+
      'stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 70 70)"></circle>';
    off+=len;
  });
  var legend=sources.map(function(s,i){
    var p=Math.round(Number(s.value||0)/total*100);
    return '<div class="lg-row" onmouseenter="hiSeg('+i+')" onmouseleave="hiSeg(-1)">'+
      '<span class="lg-dot" style="background:'+DONUT_COLORS[i%DONUT_COLORS.length]+'"></span>'+
      '<span class="lg-name">'+esc(s.name)+'</span>'+
      '<span class="lg-pct">'+p+'%</span>'+
      '<span class="lg-val">'+fmt(s.value)+'</span></div>';
  }).join('');
  return '<div class="donut-wrap"><svg width="140" height="140" viewBox="0 0 140 140" id="donut-svg">'+segs+
    '<text x="70" y="65" text-anchor="middle" font-size="20" font-weight="850" fill="#12201a">'+fmt(total)+'</text>'+
    '<text x="70" y="84" text-anchor="middle" font-size="10" fill="#8a978f">sessions</text></svg>'+
    '<div class="donut-legend">'+legend+'</div></div>';
}
function hiSeg(i){ var segs=document.querySelectorAll('#donut-svg .seg'); segs.forEach(function(s){ var on=String(i)===s.getAttribute('data-i'); s.setAttribute('stroke-width', on?'26':'20'); s.style.opacity=(i<0||on)?'1':'.45'; }); }

// SVG line chart: organic + gbp over months
function lineChart(traffic){
  var W=520,H=210, pL=34,pR=14,pT=14,pB=26, w=W-pL-pR, h=H-pT-pB;
  var max=Math.max.apply(null, traffic.map(function(t){return Math.max(t.organic,t.gbp);}).concat([10]));
  max=Math.ceil(max/100)*100;
  var n=traffic.length;
  function X(i){ return pL + (n<=1?0:(i/(n-1))*w); }
  function Y(v){ return pT + h - (v/max)*h; }
  function path(key,smooth){ return traffic.map(function(t,i){ return (i?'L':'M')+X(i).toFixed(1)+' '+Y(t[key]).toFixed(1); }).join(' '); }
  function area(key){ return path(key)+' L'+X(n-1).toFixed(1)+' '+(pT+h)+' L'+X(0).toFixed(1)+' '+(pT+h)+' Z'; }
  var grid='', ticks=4;
  for(var g=0;g<=ticks;g++){ var yy=pT+(h/ticks)*g, val=Math.round(max-(max/ticks)*g);
    grid+='<line x1="'+pL+'" y1="'+yy+'" x2="'+(W-pR)+'" y2="'+yy+'" stroke="#eef2ef"></line>'+
      '<text x="'+(pL-6)+'" y="'+(yy+3)+'" text-anchor="end" font-size="9" fill="#b8c2bc">'+val+'</text>'; }
  var xlbl=traffic.map(function(t,i){ return '<text x="'+X(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#8a978f">'+esc(t.m)+'</text>'; }).join('');
  var dots='';
  ['gbp','organic'].forEach(function(key){ var col=key==='organic'?'#15803d':'#c79a1e';
    traffic.forEach(function(t,i){ dots+='<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(t[key]).toFixed(1)+'" r="3.5" fill="#fff" stroke="'+col+'" stroke-width="2" '+
      'onmouseenter="showTip(event,\''+esc(t.m)+' · '+(key==='organic'?'Organic':'Google Business')+': '+fmt(t[key])+'\')" onmouseleave="hideTip()"></circle>'; }); });
  return '<div class="chart-legend"><span><span class="cl-dot" style="background:#15803d"></span>Organic search</span>'+
    '<span><span class="cl-dot" style="background:#c79a1e"></span>Google Business</span></div>'+
    '<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+grid+
    '<path d="'+area('organic')+'" fill="rgba(21,128,61,.10)"></path>'+
    '<path d="'+area('gbp')+'" fill="rgba(199,154,30,.10)"></path>'+
    '<path d="'+path('organic')+'" fill="none" stroke="#15803d" stroke-width="2.5"></path>'+
    '<path d="'+path('gbp')+'" fill="none" stroke="#c79a1e" stroke-width="2.5"></path>'+
    xlbl+dots+'</svg>';
}

var TAB='keywords';
function setTab(t){ TAB=t; renderTabs(); }
function renderTabs(){
  var box=el('tabbox'); if(!box) return;
  var tabs=[['keywords','Keyword rankings'],['gbp','Google Business'],['pages','Top pages']];
  var head='<div class="tabs">'+tabs.map(function(t){return '<div class="tab'+(TAB===t[0]?' on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</div>';}).join('')+'</div>';
  box.innerHTML=head+'<div style="padding-top:12px">'+(TAB==='keywords'?kwTable():TAB==='gbp'?gbpPanel():pagesTable())+'</div>';
}
function kwTable(){
  var rows=(DATA.keywords||[]).map(function(k,i){
    var chg=Number(k.prev||0)-Number(k.pos||0); // positive = moved up (lower number)
    var chgHtml=k.prev?(chg>0?'<span class="chg-up">▲ '+chg+'</span>':(chg<0?'<span class="chg-down">▼ '+Math.abs(chg)+'</span>':'<span class="chg-flat">—</span>')):'<span class="chg-flat">new</span>';
    return '<tr class="kw-row" onclick="toggleKw('+i+')"><td>'+esc(k.kw)+'</td>'+
      '<td><span class="rank-pill">#'+esc(k.pos)+'</span></td>'+
      '<td>'+chgHtml+'</td>'+
      '<td class="num">'+esc(k.vol)+'</td></tr>'+
      '<tr class="kw-explain" id="kwx-'+i+'" style="display:none"><td colspan="4">'+
        '<b>Rank</b> = where you appear on Google for this search (#1–#3 gets the vast majority of clicks). '+
        '<b>Change</b> = how your position moved vs last period. <b>Reach</b> = roughly how many people search this each month. '+
        'You’re currently #'+esc(k.pos)+' for "'+esc(k.kw)+'"'+(chg>0?(' — up '+chg+' spot'+(chg>1?'s':'')+'.'):'.')+'</td></tr>';
  }).join('');
  return '<table><thead><tr><th>Keyword</th><th>Rank</th><th>Change</th><th class="num">Reach / mo</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="font-size:11.5px;color:var(--muted-2);padding:8px 8px 0">Tap any keyword to learn what these columns mean.</div>';
}
function toggleKw(i){ var r=el('kwx-'+i); if(r) r.style.display=r.style.display==='none'?'table-row':'none'; }
function gbpPanel(){
  var k=DATA.kpis;
  return '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">'+
    gbpStat('📍','Profile views',fmt(k.gbpViews),pct(k.gbpViews,k.gbpViewsPrev),'Times your listing showed in Search & Maps.')+
    gbpStat('📞','Calls from listing',fmt(k.calls),pct(k.calls,k.callsPrev),'Calls placed straight from your Google profile.')+
    '</div>'+
    '<div style="font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.5">Your Google Business Profile is your storefront on Google Maps and local search. '+
    'We keep it optimized — photos, posts, hours, and review replies — so you show up more often when locals search nearby and pick who to call.</div>';
}
function gbpStat(icon,label,val,p,desc){
  var cls=p>0?'k-up':(p<0?'k-down':'k-flat'),arrow=p>0?'▲':(p<0?'▼':'■');
  return '<div class="panel" style="padding:13px 15px"><div style="display:flex;align-items:center;gap:9px"><div class="k-ico">'+icon+'</div>'+
    '<div><div style="font-size:22px;font-weight:850;line-height:1">'+val+'</div><div style="font-size:12px;color:var(--muted);font-weight:600">'+label+'</div></div></div>'+
    '<div class="k-delta '+cls+'" style="margin-top:8px">'+arrow+' '+Math.abs(p)+'% vs prior</div>'+
    '<div style="font-size:12px;color:var(--muted-2);margin-top:5px">'+desc+'</div></div>';
}
function pagesTable(){
  var rows=(DATA.pages||[]).map(function(pg){
    return '<tr><td>'+esc(pg.p)+'</td><td class="num">'+fmt(pg.views)+'</td><td class="num">'+esc(pg.conv)+'</td><td class="num">'+esc(pg.time)+'</td></tr>';
  }).join('');
  return '<table><thead><tr><th>Page</th><th class="num">Views</th><th class="num">Conv. rate</th><th class="num">Avg. time</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="font-size:11.5px;color:var(--muted-2);padding:8px 8px 0">Conv. rate = share of visitors to that page who became a lead. Avg. time = how long they stayed.</div>';
}

function overallTrend(){
  var k=DATA.kpis;
  var avg=Math.round((pct(k.organic,k.organicPrev)+pct(k.gbpViews,k.gbpViewsPrev)+pct(k.calls,k.callsPrev)+pct(k.conversions,k.conversionsPrev))/4);
  return avg;
}
function render(){
  var d=DATA, k=d.kpis, biz=d.business||'Your Business', trend=overallTrend();
  var html='<div class="rpt-head">'+
    '<div class="brand"><img src="/brand/icon-32.png" alt="Rank Rebels"><div><div class="bn">Rank Rebels</div><div class="bs">Performance Report</div></div></div>'+
    '<div class="h-actions">'+
      '<button class="btn" onclick="reload()">↻ Refresh</button>'+
      '<button class="btn" onclick="window.print()">🖨 Print</button>'+
      '<button class="btn btn-g" onclick="window.print()">⬇ Export PDF</button>'+
    '</div></div>'+
    '<div class="title-row"><div><h1>'+esc(biz)+' — last 90 days</h1>'+
      '<p class="subtitle">Organic search & local performance · prepared by Rank Rebels</p></div>'+
      (trend>0?'<div class="badge-trend">✨ Trending up '+trend+'%</div>':'')+
    '</div>'+
    (d.demo&&d.note?'<div class="note">'+esc(d.note)+'</div>':'')+
    '<div class="kpis">'+METRICS.map(kpiCard).join('')+'</div>'+
    '<div class="grid2">'+
      '<div class="panel"><h3>Traffic growth</h3><p class="psub">Sessions by channel, last 6 months</p>'+lineChart(d.traffic||[])+'</div>'+
      '<div class="panel"><h3>Where visitors come from</h3><p class="psub">'+fmt((d.sources||[]).reduce(function(a,s){return a+Number(s.value||0);},0))+' sessions · tap a channel to highlight</p>'+donut(d.sources||[])+'</div>'+
    '</div>'+
    '<div class="panel" style="margin-top:14px" id="tabbox"></div>'+
    '<div class="foot">Prepared by Rank Rebels · rankrebels.ai · Numbers reflect the last 90 days vs. the prior 90.</div>';
  el('app').innerHTML=html;
  renderTabs();
}

function showTip(e,txt){ var t=el('tip'); t.textContent=txt; t.style.opacity='1'; t.style.left=(e.clientX+12)+'px'; t.style.top=(e.clientY-10)+'px'; }
function hideTip(){ el('tip').style.opacity='0'; }

async function authToken(){ try{ var s=await sb.auth.getSession(); return s.data.session?s.data.session.access_token:''; }catch(e){ return ''; } }
function reload(){ load(true); }
async function load(force){
  if(!force) el('app').innerHTML='<div class="loading"><div class="spinner"></div>Loading report…</div>';
  var t=await authToken();
  if(!t){ el('app').innerHTML='<div class="loading">Please open this report from the dashboard while signed in.</div>'; return; }
  try{
    var r=await fetch('/api/report?client='+encodeURIComponent(clientId),{headers:{'Authorization':'Bearer '+t}});
    var d=await r.json().catch(function(){return {error:'Unreadable response.'};});
    if(d.error){ el('app').innerHTML='<div class="loading">'+esc(d.error)+'</div>'; return; }
    DATA=d; render();
  }catch(e){ el('app').innerHTML='<div class="loading">Could not load the report ('+esc(e.message||'network error')+').</div>'; }
}
sb.auth.getSession().then(function(){ load(); });
</script>
